user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Upstreams (Ensure these match your service names in docker-compose)
    upstream auth_service { 
        server auth-service:9000; 
    }
    upstream ip_service { 
        server ip-manager-service:9000; 
    }
    upstream gateway_service { 
        server gateway-service:9000; 
    }

    server {
        listen 80;
        server_name localhost;

        # Increase the max body size for uploads
        client_max_body_size 50M;

        location /api/auth/ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_pass auth_service;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_read_timeout 300;
            fastcgi_connect_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_buffering off;
        }

        location /api/ipmanager/ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_pass ip_service;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_read_timeout 300;
            fastcgi_connect_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_buffering off;
        }

        location /api/ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_pass gateway_service;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_read_timeout 300;
            fastcgi_connect_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_buffering off;
        }

        location / {
            root /var/www/frontend/public;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}